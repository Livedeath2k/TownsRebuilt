name: Towns Build

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Erlaubt das manuelle Starten des Workflows

jobs:
  build:
    name: Compile and Test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Package compiled files
        run: |
          cd target/dist/input
          zip -r ../../../Towns-Release.zip .

      - name: Publish Pre-Release (Main)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest Development Build
          files: Towns-Release.zip
          prerelease: true

      - name: Publish Release (Tags)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Towns-Release.zip
          generate_release_notes: true
